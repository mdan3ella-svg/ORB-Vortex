<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORB | VORTEX - COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&display=swap');
        body, html { margin: 0; padding: 0; background: #000; font-family: 'Inter', sans-serif; overflow: hidden; height: 100%; width: 100%; }
        #canvas-container { position: absolute; inset: 0; z-index: 0; }
        .hud { position: absolute; inset: 20px; pointer-events: none; display: grid; grid-template-columns: 280px 1fr 280px; grid-template-rows: 1fr auto; gap: 20px; z-index: 10; }
        .glass { background: rgba(10, 10, 15, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 20px; pointer-events: auto; }
        .data-label { font-size: 8px; letter-spacing: 0.2em; color: #a1a1aa; text-transform: uppercase; }
        .data-value { font-size: 14px; font-weight: 200; color: #fff; margin-bottom: 12px; }
        .bar { height: 2px; background: rgba(255,255,255,0.1); width: 100%; margin-bottom: 15px; }
        .fill { height: 100%; background: #fff; transition: width 0.1s linear; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="hud">
        <div class="glass flex flex-col">
            <div class="data-label">VECT_YAW</div>
            <div id="yaw-val" class="data-value">0.00°</div>
            <div class="bar"><div id="yaw-fill" class="fill" style="width: 50%;"></div></div>
            <div class="data-label">VECT_PITCH</div>
            <div id="pitch-val" class="data-value">0.00°</div>
            <div class="bar"><div id="pitch-fill" class="fill" style="width: 50%;"></div></div>
        </div>
        <div></div>
        <div class="glass text-right">
            <div class="data-label">THRUST_OUTPUT</div>
            <div id="thrust-val" class="data-value">0%</div>
            <div class="bar"><div id="thrust-fill" class="fill" style="width: 0%;"></div></div>
            <div class="data-label">SYS_STATUS</div>
            <div id="status-txt" class="text-[10px] text-white">NOMINAL</div>
        </div>
        <div class="glass col-span-3 flex justify-between items-end">
            <div class="text-[10px] text-white font-bold">ORB-VORTEX // PROCEDURAL_SYNC</div>
            <div class="text-[8px] text-zinc-500">SPD: <span id="vel">0.0</span>KM/S | SHAKE_LVL: <span id="shake-val">0</span></div>
        </div>
    </div>

<script>
    let scene, camera, renderer, ship, clock;
    const state = { yaw: 0, pitch: 0, thrust: 0 };
    let targetYaw = 0, targetPitch = 0, targetThrust = 0;
    const keys = { w:false, a:false, s:false, d:false, ArrowUp:false, ArrowDown:false };

    function init() {
        clock = new THREE.Clock();
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050508);
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 0, 10);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Procedural Starfield
        const starGeo = new THREE.BufferGeometry();
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true });
        const starPos = [];
        for(let i=0; i<3000; i++) starPos.push((Math.random()-0.5)*2000, (Math.random()-0.5)*2000, (Math.random()-0.5)*2000);
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        scene.add(new THREE.Points(starGeo, starMat));

        // Lights
        scene.add(new THREE.HemisphereLight(0x0a2a44, 0x000000, 1.5));
        scene.add(new THREE.DirectionalLight(0xffffff, 0.8));

        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        loadModel();
        animate();
    }

    function loadModel() {
        const loader = new THREE.GLTFLoader();
        loader.load('Orbvortex.glb', gltf => {
            ship = gltf.scene;
            ship.traverse(c => {
                if(c.isMesh) {
                    c.material = new THREE.MeshToonMaterial({ 
                        color: 0xffffff, 
                        flatShading: true,
                        wireframe: false
                    });
                }
            });
            scene.add(ship);
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        
        if(keys.w) targetPitch = 0.5; else if(keys.s) targetPitch = -0.5; else targetPitch = 0;
        if(keys.a) targetYaw = 0.5; else if(keys.d) targetYaw = -0.5; else targetYaw = 0;
        if(keys.ArrowUp) targetThrust = Math.min(100, targetThrust + 1);
        if(keys.ArrowDown) targetThrust = Math.max(0, targetThrust - 2);

        state.yaw += (targetYaw - state.yaw) * delta * 5;
        state.pitch += (targetPitch - state.pitch) * delta * 5;
        state.thrust += (targetThrust - state.thrust) * delta * 5;

        if(ship) {
            ship.rotation.set(state.pitch, state.yaw, -state.yaw * 0.8);
            const shake = (state.thrust / 100) * 0.15;
            camera.position.set((Math.random()-0.5)*shake, (Math.random()-0.5)*shake, 10);
        }

        document.getElementById('yaw-val').innerText = state.yaw.toFixed(2) + "°";
        document.getElementById('pitch-val').innerText = state.pitch.toFixed(2) + "°";
        document.getElementById('yaw-fill').style.width = (50 + state.yaw * 50) + "%";
        document.getElementById('pitch-fill').style.width = (50 + state.pitch * 50) + "%";
        document.getElementById('thrust-val').innerText = Math.floor(state.thrust) + "%";
        document.getElementById('thrust-fill').style.width = state.thrust + "%";
        document.getElementById('vel').innerText = (state.thrust * 1.2).toFixed(1);
        document.getElementById('shake-val').innerText = Math.floor(state.thrust * 0.15);

        renderer.render(scene, camera);
    }
    window.onload = init;
</script>
</body>
</html>
