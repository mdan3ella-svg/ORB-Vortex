<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORB | Vortex - Sim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Courier New', monospace; }
        #canvas-container { position: absolute; inset: 0; z-index: 0; }
        .hud-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; padding: 15px; display: grid; grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; gap: 10px; }
        @media (min-width: 768px) { .hud-layer { grid-template-columns: 300px 1fr 300px; padding: 25px; } }
        .panel { border: 1px solid #3b82f6; background: rgba(15, 23, 42, 0.6); padding: 12px; color: #60a5fa; pointer-events: auto; backdrop-filter: blur(10px); }
        .gauge { height: 4px; background: #1e3a8a; margin: 4px 0 10px 0; }
        .fill { height: 100%; background: #3b82f6; transition: width 0.1s; }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="hud-layer">
    <!-- Left Cockpit Panel -->
    <div class="panel">
        <h2 class="text-[10px] font-bold text-blue-300 uppercase mb-4">Navigation Data</h2>
        <div class="text-[9px]">YAW: <span id="yaw-val">0.00</span></div>
        <div class="gauge"><div id="yaw-fill" class="fill" style="width: 50%;"></div></div>
        <div class="text-[9px]">PITCH: <span id="pitch-val">0.00</span></div>
        <div class="gauge"><div id="pitch-fill" class="fill" style="width: 50%;"></div></div>
    </div>
    
    <div></div>
    
    <!-- Right Cockpit Panel -->
    <div class="panel">
        <h2 class="text-[10px] font-bold text-blue-300 uppercase mb-4">Thruster Matrix</h2>
        <div class="text-[9px]">THRUST: <span id="thrust-val">0%</span></div>
        <div class="gauge"><div id="thrust-fill" class="fill" style="width: 0%;"></div></div>
        <div class="text-[9px] mt-4 text-blue-400">SPRITE: ORBVORTEX.GLB</div>
        <div id="status" class="text-[9px] text-blue-200 opacity-60">STATUS: INITIALIZING</div>
    </div>

    <!-- Bottom Status Bar -->
    <div class="panel col-span-1 md:col-span-3 flex justify-between items-center self-end mt-auto">
        <div class="text-[9px]">VEL: <span id="vel">0.0</span> km/s</div>
        <div class="text-[10px] text-blue-300 font-bold tracking-widest text-center flex-1 mx-4 opacity-80">
            CONTROLS: [W/S] PITCH &nbsp;|&nbsp; [A/D] YAW &nbsp;|&nbsp; [↑/↓] THRUST
        </div>
        <div class="text-[9px]">SYS_SYNC: <span id="sync">100%</span></div>
    </div>
</div>

<script>
    let scene, camera, renderer, ship, starSystem;
    const loader = new THREE.GLTFLoader();
    
    // State logic for smooth user input
    const state = { yaw: 0, pitch: 0, thrust: 0 };
    let targetYaw = 0;
    let targetPitch = 0;
    let targetThrust = 0;
    
    const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false };
    
    // Array to hold our procedural celestial bodies
    const celestialBodies = [];

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0f1c); // Nebula Deep Blue background
        scene.fog = new THREE.FogExp2(0x0f172a, 0.003); // Lighter fog so we can see planets in the distance
        
        camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 2000);
        camera.position.set(0, 0, 10);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        // --- ADDED FOR PBR & REALISTIC LIGHTING ---
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputEncoding = THREE.sRGBEncoding;
        
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Load Skybox and HDRI Environment Map (galaxy.jpg)
        const texLoader = new THREE.TextureLoader();
        texLoader.load('galaxy.jpg', function(texture) {
            texture.mapping = THREE.EquirectangularReflectionMapping;
            texture.encoding = THREE.sRGBEncoding;
            scene.background = texture;
            scene.environment = texture; // Provides PBR reflections to all materials
            document.getElementById('status').innerText = "STATUS: ENV_MAP_LOADED";
        }, undefined, function(err) {
            console.warn("Could not load galaxy.jpg skybox, using default deep space environment.", err);
        });

        // Add Realistic PBR Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.3)); // Neutral ambient for realistic shadows
        const sunLight = new THREE.DirectionalLight(0xffeedd, 2.0); // Sun-like directional light
        sunLight.position.set(100, 50, 50);
        scene.add(sunLight);
        
        // Optional fill light for the dark side
        const fillLight = new THREE.DirectionalLight(0xaaccff, 0.5);
        fillLight.position.set(-100, -50, -50);
        scene.add(fillLight);

        // Particle Starfield
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(3000 * 3);
        for(let i=0; i<3000*3; i++) {
            starPos[i] = (Math.random() - 0.5) * 1000;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0x93c5fd, size: 0.3, transparent: true, opacity: 0.8 });
        starSystem = new THREE.Points(starGeo, starMat);
        scene.add(starSystem);

        // Generate Procedural Planets/Asteroids
        createProceduralUniverse();

        // Event Listeners for Controls
        window.addEventListener('keydown', (e) => {
            if(keys.hasOwnProperty(e.key)) keys[e.key] = true;
            if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true;
        });
        
        window.addEventListener('keyup', (e) => {
            if(keys.hasOwnProperty(e.key)) keys[e.key] = false;
            if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false;
        });

        loadModel();
        animate();
    }

    function createProceduralUniverse() {
        const geometries = [
            new THREE.IcosahedronGeometry(1, 2), // Low poly planet
            new THREE.IcosahedronGeometry(1, 4), // Smooth planet
            new THREE.DodecahedronGeometry(1, 0) // Asteroid shape
        ];

        for(let i = 0; i < 15; i++) {
            // Randomize cobalt/cyan hues for PBR standard materials
            const hue = 0.55 + (Math.random() * 0.1); 
            const mat = new THREE.MeshStandardMaterial({
                color: new THREE.Color().setHSL(hue, 0.6, 0.4),
                roughness: Math.random() * 0.8 + 0.2, // Physical roughness
                metalness: Math.random() * 0.6,       // Physical metalness
                flatShading: Math.random() > 0.5
            });

            const geo = geometries[Math.floor(Math.random() * geometries.length)];
            const mesh = new THREE.Mesh(geo, mat);

            // Random position far down the Z-axis
            resetCelestialBody(mesh);
            // Stagger initial Z positions so they don't all spawn at once
            mesh.position.z = -Math.random() * 1000; 

            scene.add(mesh);
            celestialBodies.push(mesh);
        }
    }

    function resetCelestialBody(mesh) {
        // Spawn deep in the background
        mesh.position.z = -1000 - (Math.random() * 500);
        // Random X and Y spread
        mesh.position.x = (Math.random() - 0.5) * 600;
        mesh.position.y = (Math.random() - 0.5) * 600;
        
        // Random scale between 10 and 60
        const scale = 10 + Math.random() * 50;
        mesh.scale.set(scale, scale, scale);
        
        // Random rotation speeds
        mesh.userData.rotX = (Math.random() - 0.5) * 0.01;
        mesh.userData.rotY = (Math.random() - 0.5) * 0.01;
    }

    function loadModel() {
        // Auto-detect if we are in the AI Canvas environment or running locally/hosted
        const isCanvasEnv = window.location.hostname.includes('usercontent') || window.location.protocol === 'blob:';
        const modelUrl = isCanvasEnv ? 'uploaded:Orbvortex.glb' : 'Orbvortex.glb';
        
        loader.load(modelUrl, (gltf) => {
            ship = gltf.scene;
            
            // Allow native GLTF PBR materials to load and react to the environment map
            ship.traverse(c => { 
                if(c.isMesh && c.material) {
                    c.material.envMapIntensity = 1.0;
                    c.material.needsUpdate = true;
                }
            });
            
            // Position ship slightly lower so it doesn't block the center view
            ship.position.y = -1;
            scene.add(ship);
            document.getElementById('status').innerText = "STATUS: UAP_SYNCED (PBR)";
        }, undefined, (err) => {
            console.warn("Error loading GLB from blob, falling back to procedural mesh.", err);
            
            // Show specific error if user just double-clicked the HTML file
            if (window.location.protocol === 'file:') {
                document.getElementById('status').innerText = "STATUS: CORS_ERROR (USE LOCAL SERVER)";
                document.getElementById('status').classList.replace('text-blue-200', 'text-red-400');
            } else {
                document.getElementById('status').innerText = "STATUS: LATTICE_FALLBACK";
            }

            ship = new THREE.Mesh(
                new THREE.IcosahedronGeometry(1.5, 2), 
                new THREE.MeshStandardMaterial({ color: 0x60a5fa, roughness: 0.2, metalness: 0.8, wireframe: true })
            );
            ship.position.y = -1;
            scene.add(ship);
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        
        // Flight Control Logic
        if (keys.w) targetPitch = 0.5;
        else if (keys.s) targetPitch = -0.5;
        else targetPitch = 0;

        if (keys.a) targetYaw = 0.5;
        else if (keys.d) targetYaw = -0.5;
        else targetYaw = 0;

        if (keys.ArrowUp) targetThrust = Math.min(100, targetThrust + 0.5);
        if (keys.ArrowDown) targetThrust = Math.max(0, targetThrust - 1.0);

        // Smoothly interpolate (lerp) current state to target state
        state.yaw += (targetYaw - state.yaw) * 0.05;
        state.pitch += (targetPitch - state.pitch) * 0.05;
        state.thrust += (targetThrust - state.thrust) * 0.05;

        // Apply motion to Ship Model
        if(ship) { 
            ship.rotation.y = state.yaw; 
            ship.rotation.x = state.pitch; 
            // Bank/Roll effect
            ship.rotation.z = -state.yaw * 0.8;
            
            // Subtle hover effect
            ship.position.y = -1 + Math.sin(Date.now() * 0.002) * 0.1;
        }

        // Calculate actual forward speed based on thrust (plus a tiny baseline drift)
        const forwardSpeed = 0.5 + (state.thrust * 0.15);

        // Move Celestial Bodies (Planets/Asteroids)
        celestialBodies.forEach(body => {
            // Move object towards camera on Z axis
            body.position.z += forwardSpeed;
            
            // Give them some natural rotation
            body.rotation.x += body.userData.rotX;
            body.rotation.y += body.userData.rotY;

            // If object passes behind the camera (Z > 20), recycle it deep into space
            if (body.position.z > 20) {
                resetCelestialBody(body);
            }
        });

        // Rotate the starfield slightly based on yaw/pitch to simulate turning
        if(starSystem) {
            starSystem.rotation.y -= state.yaw * 0.01;
            starSystem.rotation.x -= state.pitch * 0.01;
        }

        // Update UI Telemetry Data
        document.getElementById('yaw-val').innerText = state.yaw.toFixed(2);
        document.getElementById('yaw-fill').style.width = (50 + state.yaw * 100) + '%';
        
        document.getElementById('pitch-val').innerText = state.pitch.toFixed(2);
        document.getElementById('pitch-fill').style.width = (50 + state.pitch * 100) + '%';
        
        document.getElementById('thrust-val').innerText = Math.floor(state.thrust) + '%';
        document.getElementById('thrust-fill').style.width = state.thrust + '%';
        
        document.getElementById('vel').innerText = (state.thrust * 12.5).toFixed(1);

        renderer.render(scene, camera);
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };

    window.onload = init;
</script>
</body>
</html>
